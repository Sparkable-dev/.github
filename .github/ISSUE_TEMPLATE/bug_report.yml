name: 🐛 Bug Report
description: Something is broken or not working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Golden rule:** Write it so someone who has never seen the problem can find it and see it themselves.
  - type: textarea
    id: description
    attributes:
      label: What's broken?
      description: Describe the problem in 1–3 sentences. What did you expect to happen, and what actually happened?
      placeholder: "On the checkout page, clicking 'Pay Now' does nothing. I expected to be taken to the payment screen."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: How did you get there?
      description: List the exact steps so anyone can reproduce it.
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. Then ...
        4. ❌ Problem happens here
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device
      placeholder: "e.g. iPhone 15, MacBook Pro, Windows laptop, Samsung S24"
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / App
      placeholder: "e.g. Safari, Chrome, Firefox, mobile app"
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page / Screen
      placeholder: "URL or screen name where it happens"
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot / Screen recording
      description: Drag and drop a screenshot or recording here. Mark the broken part with an arrow or circle if it's not obvious.
    validations:
      required: true
