name: 🐛 Bug Report
description: Something is broken or not working as expected
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What's broken?
      description: What did you expect to happen, and what actually happened?
      placeholder: "On the checkout page, clicking 'Pay Now' does nothing. I expected to be taken to the payment screen."
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page / Screen
      placeholder: "URL or screen name where it happens"
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: How did you get there?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. ❌ Problem happens here
    validations:
      required: true
  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - Android phone
        - iPhone
        - Windows laptop
        - Mac laptop
        - Windows PC
        - Other
    validations:
      required: true
  - type: input
    id: device-details
    attributes:
      label: Device details (optional)
      placeholder: "e.g. iPhone 15 Pro, Samsung S24 — leave empty if not relevant"
    validations:
      required: false
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Safari
        - Firefox
        - Edge
        - Mobile app
        - Other
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot / Screen recording (optional)
      description: Drag and drop a screenshot or recording here — it helps a lot. Mark the broken part if it's not obvious.
    validations:
      required: false
